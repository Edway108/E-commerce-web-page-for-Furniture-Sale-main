<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart — Furnish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />


    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/cart.css">
    <script src="../jsLogical/cart.js">a</script>

    <link rel="icon" type="image/png" href="../style/logo.png">
</head>

<body>

    <!-- ── NAVBAR ── -->
    <header class="navbar">
        <a href="#" class="brand">Furnish</a>
        <nav class="nav-links">
            <a href="mainPage.html">Shop</a>
            <!-- <a href="#">Collections</a> -->
            <a href="" class="active">Cart <span id="cartBadge" class="badge">0</span></a>
        </nav>
        <button class="btn-logout" id="logoutBtn" onclick="logout()">Logout</button>
    </header>

    <!-- ── HERO STRIP ── -->
    <section class="page-hero">
        <div class="hero-label">Your Selection</div>
        <h1 class="hero-title">Shopping Cart</h1>
    </section>

    <!-- ── MAIN ── -->
    <main class="layout">

        <!-- LEFT: item list -->
        <section class="cart-section">

            <!-- Loading -->
            <div id="loadingState" class="state-box" style="display:none;">
                <div class="spinner"></div>
                <p>Loading your cart…</p>
            </div>

            <!-- Empty -->
            <div id="emptyState" class="state-box" style="display:none;">
                <div class="empty-icon">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 01-8 0" />
                    </svg>
                </div>
                <h3>Your cart is empty</h3>
                <p>Discover our curated furniture collection.</p>
                <a href="#" class="btn-primary">Browse Shop</a>
            </div>

            <!-- Grid -->
            <div id="grid" class="cart-grid"></div>
        </section>

        <!-- RIGHT: order summary -->
        <aside class="summary-panel" id="summaryPanel">
            <div class="summary-header">Order Summary</div>

            <div class="summary-row">
                <span>Subtotal (<span id="itemCount">0</span> items)</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span id="shipping">—</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-row total-row">
                <span>Total</span>
                <span id="grandTotal">$0.00</span>
            </div>

            <button class="btn-checkout" id="checkoutBtn">Proceed to Checkout</button>
            <button class="btn-clear" id="clearCartBtn" onclick="deleteCart()">Remove Cart</button>

            <div class="secure-note">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
                Secure checkout
            </div>
        </aside>
    </main>

    <!-- ── VIEW MODAL ── -->
    <div id="viewModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" onclick="closeView()">✕</button>
            <div id="viewContent"></div>
        </div>
    </div>

    <!-- ── TOAST ── -->
    <div id="toast" class="toast"></div>

</body>

</html>
