<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Register</title>
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/login.css">
    <link rel="icon" type="image/png" href="../style/logo.png">\
    <script src="../jsLogical/register.js"></script>



</head>

<body>

    <div class="glass-box">
        <div class="container">

            <h1>USER REGISTER</h1>
            <div class="section-title">Register Your Account</div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password">
            </div>
            <div class="form-group">
                <label>Re-enter Password</label>
                <input type="password" id="repassword">
            </div>

            <button type="button" class="login-btn" onclick="register()">Register</button>

            <div class="links">
                <a href="#">__________________________________</a>
            </div>

            <div class="links">
                Already have an account? <a href="login.html">Login</a>
            </div>

        </div>
    </div>


</body>

</html>
