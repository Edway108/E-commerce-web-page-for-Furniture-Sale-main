<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Cormorant+Garamond&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/chat.css">
    <link rel="icon" type="image/png" href="../style/logo.png">


</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo" onclick="reload()"><span>Furnituree</span></div>
            <div class="header-line"></div>
            <div class="header-sub">Live Chat</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="grid-container">

        <div class="card" style="max-width: 700px; margin: auto;">

            <!-- TITLE -->
            <div class="card-body">
                <div class="card-name">Chat Room</div>
                <div class="card-desc">Talk with everyone in real-time</div>
            </div>

            <!-- MESSAGES -->
            <div id="messages" style="height: 300px; overflow-y: auto; padding: 20px; background-color:#ffffff;">
            </div>

            <!-- INPUT -->
            <div class="card-body">



                <div class="field">
                    <label>Message</label>
                    <input id="messageInput" placeholder="Type something...">
                </div>

                <div class="card-actions">
                    <button class="btn-icon btn-edit" id="btn-join" onclick="handleClick()">Join</button>
                    <button class="btn-icon btn-edit" id="btn-send" onclick="sendMessage()" }>Send</button>
                </div>

            </div>

        </div>

    </div>

    <!-- SOCKET -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script src="../jsLogical/chat.js"></script>

</body>

</html>
