<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furnituree — Admin Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/admin.css">
</head>

<body class="admin-page">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">Furni<span>turee</span></div>
        <div class="sidebar-sub">Admin Panel</div>

        <nav class="sidebar-nav">

            <div class="nav-item active" onclick="showSection('dashboard')">
                Dashboard
            </div>

            <!-- PRODUCT -->
            <div class="nav-group">
                <div class="nav-item nav-parent" onclick="toggleDropdown('product-menu', this)">
                    Products
                    <span class="chevron">▼</span>
                </div>

                <div class="nav-dropdown" id="product-menu">
                    <div class="nav-child" onclick="showSection('product-list')">
                        • All Products
                    </div>
                    <div class="nav-child" onclick="openAddModal('product')">
                        • Add Product
                    </div>
                </div>
            </div>

            <!-- USER -->
            <div class="nav-group">
                <div class="nav-item nav-parent" onclick="toggleDropdown('user-menu', this)">
                    Users
                    <span class="chevron">▼</span>
                </div>

                <div class="nav-dropdown" id="user-menu">
                    <div class="nav-child" onclick="showSection('user-list')">
                        • All Users
                    </div>
                    <div class="nav-child" onclick="openAddModal('user')">
                        • Add User
                    </div>
                </div>
            </div>

        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">
            <button onclick="toggleSidebar()">☰</button>
            <h2 id="page-title">Dashboard</h2>

        </header>
        <!-- DASHBOARD -->
        <section class="section active" id="section-dashboard">
            <h1>Dashboard</h1>
            <div type="button" class="btn-add" onclick="logout()">Log out</div>

        </section>

        <!-- PRODUCT -->
        <section class="section" id="section-product-list">
            <h1>Products</h1>
        </section>

        <!-- USER -->
        <section class="section" id="section-user-list">
            <h1>Users</h1>
        </section>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../jsLogical/admin.js"></script>
</body>

</html>
