spring.application.name=furnituree
server.port=${PORT:8080}

# Keep the original MySQL database name so your old furniture_store data can still be reused.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/furniture_store?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload-dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Run the compatibility SQL before Hibernate tries to update old MySQL tables.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
